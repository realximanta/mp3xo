<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MP3X</title>

  <style>
    body {
  font-family: Arial, sans-serif;
  background: #f3f3f3;
  color: #111;
  margin: 0;
  padding: 12px;
  font-size: 18px;
  line-height: 1.8;
}

.container {
  background: white;
  max-width: 700px;
  margin: auto;
  padding: 14px;
  border: 1px solid #dcdcdc;
}

h1 {
  font-size: 24px;
  margin-top: 0;
  margin-bottom: 4px;
  letter-spacing: 1px;
}

.subtitle {
  font-size: 14px;
  color: #555;
  margin-bottom: 18px;
}

.line {
  border-top: 1px solid #ddd;
  margin-bottom: 14px;
}

#stories {
  margin-top: 10px;
}

a {
  color: #0044cc;
  text-decoration: underline;
  display: block;
  padding: 8px 0;
  word-break: break-word;
}

a:focus,
a:active {
  background: #dde7ff;
}

.footer {
  margin-top: 26px;
  font-size: 12px;
  color: #666;
  border-top: 1px solid #ddd;
  padding-top: 10px;
}
  </style>
</head>
<body>

  <h1>MP3X BY REAL.XIMANTA</h1>

  <div class="subtitle">
    100% TRUSTED platform To Download Free songs & musics.
  </div>

  <div id="stories">
    Loading musíso...
  </div>

  <div class="footer">
    Powered by MP3X
  </div>

  <script>
    fetch('musics.txt')
      .then(response => response.text())
      .then(text => {

        const container = document.getElementById('stories');
        container.innerHTML = '';

        const lines = text.trim().split('\n');

        lines.forEach(line => {

          if (!line.trim()) return;

          const parts = line.split('|');

          const file = parts[0]?.trim();
          const title = parts[1]?.trim();

          if (!file || !title) return;

          const link = document.createElement('a');

          link.href = file;
          link.innerText = title;
          link.setAttribute('download', '');

          container.appendChild(link);
        });
      })
      .catch(error => {
        document.getElementById('stories').innerHTML = 'Unable to load stories.';
      });
  </script>

</body>
</html>
