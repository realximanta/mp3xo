name: Generate Music Index vX1.298.9 Ximanta

on:
  push:
    paths:
      - "*.mp3"           
      - "generator.py"
  workflow_dispatch:      


concurrency:
  group: generate-index
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write     

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          
          # credits - @real.ximanta and realximanta
          
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
# wdym ur start liking my project soo much that u have clone it?
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Run generator
        run: python generator.py

      - name: Commit and push index.html (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only index.html.
          # generator.py and *.mp3 files are never committed by this bot,
          # which prevents any possibility of an infinite trigger loop.
          git add index.html

          # Exit 0 from diff means nothing staged → skip commit entirely.
          if git diff --cached --quiet; then
            echo "index.html unchanged — nothing to commit."
          else
            # [skip ci] tells GitHub not to re-trigger workflows on this
            # bot commit, providing a hard guarantee against infinite loops.
            git commit -m "chore: regenerate index.html from MP3 files [skip ci]"
            git push
          fi
